name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --prefer-binary -r python/requirements.txt

      - name: Install pytest + coverage
        run: pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest python/test_analyze.py -v --cov=python/analyze --cov-report=term-missing

  node:
    name: Node.js Tests (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run tests with coverage
        run: npm test -- --coverage
        working-directory: backend

  vue:
    name: Vue.js Tests (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests with coverage
        run: npx vitest run --coverage
        working-directory: frontend
